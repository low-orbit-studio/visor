name: solespark
version: 1

colors:
  primary: "#6952D9"
  accent: "#FF00C8"
  neutral: "#6B7280"
  background: "#1A1F22"
  surface: "#242628"
  success: "#34C759"
  warning: "#FFCC00"
  error: "#FF3B30"
  info: "#5BC4FF"

colors-dark:
  background: "#1A1F22"
  surface: "#242628"

typography:
  heading:
    family: "Outfit"
    weight: 600
  body:
    family: "Outfit"
    weight: 400
  # Per-slot overrides matching SoleSpark's Figma type scale.
  # (`height` is not yet part of the schema — slot heights stay at
  # Material defaults until Visor adds line-height support.)
  slots:
    displayLarge:  { size: 56, weight: 500, letter-spacing: -0.5 }
    displayMedium: { size: 32, weight: 600, letter-spacing: -0.25 }
    displaySmall:  { size: 28, weight: 500, letter-spacing: 0 }
    headlineLarge: { size: 26, weight: 500, letter-spacing: 0 }
    headlineMedium: { size: 22, weight: 500, letter-spacing: 0 }
    headlineSmall: { size: 18, weight: 600, letter-spacing: 0 }
    titleLarge:    { size: 16, weight: 600, letter-spacing: 0 }
    titleMedium:   { size: 14, weight: 600, letter-spacing: 0.1 }
    titleSmall:    { size: 13, weight: 600, letter-spacing: 0.1 }
    bodyLarge:     { size: 16, weight: 300, letter-spacing: 0.15 }
    bodyMedium:    { size: 14, weight: 400, letter-spacing: 0.25 }
    bodySmall:     { size: 12, weight: 300, letter-spacing: 0.4 }
    labelLarge:    { size: 17, weight: 500, letter-spacing: 0.1 }
    labelMedium:   { size: 15, weight: 600, letter-spacing: 0.5 }
    labelSmall:    { size: 12, weight: 500, letter-spacing: 0.5 }
    labelXSmall:   { size: 10, weight: 500, letter-spacing: 0.5 }

spacing:
  base: 4

# SoleSpark's existing radius scale uses 6pt for buttons, 8pt for inputs,
# 12pt for cards, 16pt for dialogs, 24pt for bottom sheets (`topXlg`).
# Visor's 5-step scale maps those one-to-one: sm/md/lg/xl/pill.
radius:
  sm: 6
  md: 8
  lg: 16
  xl: 24
  pill: 9999

shadows:
  xs: "0 1px 2px rgba(0, 0, 0, 0.2)"
  sm: "0 2px 4px rgba(0, 0, 0, 0.25)"
  md: "0 4px 8px rgba(0, 0, 0, 0.3)"
  lg: "0 8px 16px rgba(0, 0, 0, 0.35)"
  xl: "0 16px 32px rgba(0, 0, 0, 0.4)"

motion:
  duration-fast: "100ms"
  duration-normal: "200ms"
  duration-slow: "400ms"
  easing: "cubic-bezier(0.4, 0, 0.2, 1)"
