name: visor_widgetbook
description: Widgetbook preview app for Visor's Flutter widgets (VisorButton, VisorStatCard, VisorEmptyState, VisorSectionHeader).
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.5.0
  flutter: ^3.24.0

dependencies:
  flutter:
    sdk: flutter
  widgetbook: ^3.14.0
  widgetbook_annotation: ^3.5.0
  # visor_core is on pub.dev post-M4.B; until then pubspec_overrides.yaml
  # forces the local path. Keep the `^0.1.0` constraint here so the
  # widgetbook app stays compatible with the eventual published version.
  visor_core: ^0.1.0
  # All 11 Visor-generated ThemeData objects — regenerate with
  # `npm run themes:apply-flutter`. Provides VisorThemes.blackout,
  # .modernMinimal, .solespark, etc. for the Widgetbook theme switcher.
  visor_themes:
    path: ../visor_themes
  # Persists the active widgetbook theme across reloads (key: visor-widgetbook-theme).
  shared_preferences: ^2.3.0

dev_dependencies:
  build_runner: ^2.4.13
  widgetbook_generator: ^3.14.0
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
