name: blackout
version: 1
group: Visor

colors:
  primary: "#666666"
  neutral: "#333333"
  background: "#000000"
  surface: "#0a0a0a"

colors-dark:
  background: "#000000"
  surface: "#0a0a0a"

typography:
  heading:
    family: Satoshi
    weight: 700
    weights: [400, 700]
    source: fontshare
  body:
    family: Satoshi
    weight: 400
    weights: [400, 700]
    source: fontshare

radius:
  sm: 2
  md: 4
  lg: 8
  xl: 12

shadows:
  xs: "none"
  sm: "none"
  md: "none"
  lg: "none"
  xl: "none"

motion:
  duration-fast: "100ms"
  duration-normal: "150ms"
  duration-slow: "300ms"

overrides:
  dark:
    # VI-346: text-* overrides retained — blackout is an always-dark glass
    # theme with neutral=#333333 (intentionally dark for flattened elevation).
    # Derived shades from that anchor would not clear AA on near-black bg;
    # alpha-blended whites are the stylistic + a11y solution here.
    text-primary: "rgba(255, 255, 255, 0.7)"
    text-secondary: "rgba(255, 255, 255, 0.70)"
    text-tertiary: "rgba(255, 255, 255, 0.55)"
    text-disabled: "rgba(255, 255, 255, 0.1)"
    surface-page: "#000000"
    surface-card: "rgba(255, 255, 255, 0.04)" # glass — intentional translucency for ambient inline surfaces (cards, nav)
    surface-popover: "#141414" # opaque — floating panels over arbitrary content must not be see-through
    surface-subtle: "rgba(255, 255, 255, 0.02)"
    surface-muted: "rgba(255, 255, 255, 0.04)"
    border-default: "rgba(255, 255, 255, 0.06)"
    border-muted: "rgba(255, 255, 255, 0.03)"
    border-strong: "rgba(255, 255, 255, 0.1)"
  light:
    # Blackout is always-dark — light mode uses near-black backgrounds.
    # Every token here must work on #0a0a0a, not on white.
    # VI-346: text-* overrides retained (stylistic) — always-dark theme.
    # VI-417: extended overrides.light to cover all surface/interactive/border
    # tokens the engine would otherwise emit with bright defaults. Values are
    # shifted one step up from their dark-mode counterparts ("barely lighter").
    text-primary: "rgba(255, 255, 255, 0.75)"
    text-secondary: "rgba(255, 255, 255, 0.5)"
    text-tertiary: "rgba(255, 255, 255, 0.55)"
    text-disabled: "rgba(255, 255, 255, 0.12)"
    surface-page: "#0a0a0a"
    surface-card: "rgba(255, 255, 255, 0.05)" # glass — intentional translucency for ambient inline surfaces (cards, nav)
    surface-popover: "#141414" # opaque — floating panels over arbitrary content must not be see-through
    surface-subtle: "rgba(255, 255, 255, 0.02)"
    surface-muted: "rgba(255, 255, 255, 0.05)"
    # Interactive surfaces: keep dark (theme engine defaults to white in light mode)
    surface-interactive-default: "transparent"
    surface-interactive-hover: "rgba(255, 255, 255, 0.08)"
    surface-interactive-active: "rgba(255, 255, 255, 0.12)"
    surface-interactive-disabled: "rgba(255, 255, 255, 0.04)"
    # Selected + accent-subtle: near-black raised surfaces
    surface-selected: "#303030"
    surface-accent-subtle: "#1f1f1f"
    # Status -subtle: tinted near-black (engine default emits bright pastel tints)
    surface-success-subtle: "#003814"
    surface-warning-subtle: "#432600"
    surface-error-subtle: "#4e0006"
    surface-info-subtle: "#002e44"
    # Elevation ladder: near-black, shifted one step up from dark counterparts
    surface-elev-0: "#101011"
    surface-elev-1: "#181818"
    surface-elev-2: "#212121"
    surface-elev-3: "#282828"
    surface-elev-4: "#303030"
    border-default: "rgba(255, 255, 255, 0.08)"
    border-muted: "rgba(255, 255, 255, 0.04)"
    border-strong: "rgba(255, 255, 255, 0.12)"
    border-disabled: "#212121"
    # Interactive secondary + ghost: near-black surfaces, near-white text
    interactive-secondary-bg: "#212121"
    interactive-secondary-bg-hover: "#282828"
    interactive-secondary-bg-active: "#303030"
    interactive-secondary-text: "#ffffff"
    interactive-secondary-border: "#303030"
    interactive-ghost-bg: "#212121"
    interactive-ghost-bg-hover: "#282828"
