name: solespark
version: 1

# SoleSpark is a dark-first, elevated-design Flutter app.
# Dark mode is the primary mode — light companion is derived (not source-provided).
# Source: ~/Code/solespark/solespark-app/solespark-client/packages/ui/lib/src/
# Visual character: near-black blue-charcoal canvas, quietly elevated graphite surfaces,
# signature vibrant purple (#6952D9) blooming into lavender and magenta. Airy/editorial type.

colors:
  primary: "#6952D9"
  accent: "#C5B8FF"
  neutral: "#3A3D42"
  background: "#F7F8FA"
  surface: "#FFFFFF"
  success: "#34C759"
  warning: "#FFCC00"
  error: "#FF3B30"
  info: "#C5B8FF"

colors-dark:
  primary: "#6952D9"
  accent: "#C5B8FF"
  background: "#1A1F22"
  surface: "#242628"
  error: "#FF3B30"

typography:
  heading:
    family: "Outfit"
    weight: 500
  body:
    family: "Outfit"
    weight: 300
  letter-spacing:
    normal: "0.02em"

spacing:
  base: 4

radius:
  sm: 8
  md: 12
  lg: 16
  xl: 24
  pill: 9999

# SoleSpark uses soft elevation — layered black shadows, not flat design.
# Signature purple glow (0 0 16px 2px #6952D980) is reserved for emphasis — see shadow-xl.
shadows:
  xs: "0 1px 2px rgba(0, 0, 0, 0.12)"
  sm: "0 2px 4px rgba(0, 0, 0, 0.20)"
  md: "0 4px 8px rgba(0, 0, 0, 0.20)"
  lg: "0 8px 16px rgba(0, 0, 0, 0.20)"
  xl: "0 12px 24px rgba(0, 0, 0, 0.40)"

motion:
  duration-fast: "150ms"
  duration-normal: "250ms"
  duration-slow: "400ms"
  easing: "cubic-bezier(0.4, 0, 0.2, 1)"

overrides:
  dark:
    text-primary: "#FFFFFF"
    text-secondary: "rgba(255, 255, 255, 0.65)"
    text-tertiary: "rgba(255, 255, 255, 0.40)"
    text-disabled: "rgba(255, 255, 255, 0.25)"
    surface-page: "#1A1F22"
    surface-card: "#242628"
    surface-subtle: "rgba(255, 255, 255, 0.04)"
    surface-muted: "rgba(255, 255, 255, 0.03)"
    border-default: "#3A3D42"
    border-muted: "#2E3033"
    border-strong: "rgba(255, 255, 255, 0.14)"
    interactive-primary-bg: "#6952D9"
  light:
    text-primary: "#1A1F22"
    text-secondary: "rgba(26, 31, 34, 0.65)"
    text-tertiary: "rgba(26, 31, 34, 0.40)"
    text-disabled: "rgba(26, 31, 34, 0.25)"
    surface-page: "#F7F8FA"
    surface-card: "#FFFFFF"
    surface-subtle: "rgba(0, 0, 0, 0.03)"
    surface-muted: "rgba(0, 0, 0, 0.02)"
    border-default: "rgba(0, 0, 0, 0.08)"
    border-muted: "rgba(0, 0, 0, 0.04)"
    border-strong: "rgba(0, 0, 0, 0.14)"
    interactive-primary-bg: "#6952D9"
