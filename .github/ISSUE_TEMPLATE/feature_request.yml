name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: "Have an idea? We'd love to hear it."
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: I'm trying to do X but can't because...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Component
        - Token / theming
        - CLI
        - Theme engine
        - Docs
        - Other
    validations:
      required: true
