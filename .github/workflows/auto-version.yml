name: Auto Version

on:
  pull_request:
    types: [closed]

concurrency:
  # Single queue — prevents two simultaneous patch bumps racing to push to main.
  group: auto-version
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: read

jobs:
  bump:
    name: Bump Patch Version
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          # Uses GITHUB_TOKEN with contents: write to push directly to main.
          # If main has branch protection requiring PRs, replace with a PAT
          # stored as AUTO_VERSION_TOKEN and add the bot to the bypass list.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch PR file list
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER/files" \
            --paginate > /tmp/files.json

      - name: Bump patch versions for changed packages
        id: bump
        run: node scripts/auto-version.mjs /tmp/files.json

      - name: Commit and push version bumps
        if: steps.bump.outputs.bumped == 'true'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/tokens/package.json packages/cli/package.json packages/theme-engine/package.json
          git commit -m "chore: patch version bump for PR #$PR_NUMBER"
          git push origin main
