name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docs: ${{ steps.filter.outputs.docs }}
      flutter: ${{ steps.filter.outputs.flutter }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for code changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - '!*.md'
              - '!docs/**'
              - '!LICENSE'
              - '!.github/FUNDING.yml'
              - '!.github/ISSUE_TEMPLATE/**'
              - '!.github/PULL_REQUEST_TEMPLATE.md'
              - '!packages/docs/content/**'
            docs:
              - 'packages/docs/**'
              - 'components/**'
            flutter:
              - 'components/flutter/**'
              - 'packages/visor-flutter/**'
              - '.github/workflows/ci.yml'

  lint-and-validate:
    name: Lint & Validate
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Validate (strict - fails on any warning)
        run: npm run validate:strict

  typecheck:
    name: Typecheck
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

  build-and-test:
    name: Build & Test (shard ${{ matrix.shard }}/4)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Tests only need the workspace packages resolved — they don't need the
      # Next.js docs build (covered by `verify-docs` job). Saves ~30s/shard.
      - name: Build (packages only, skip docs)
        run: npm run build -w packages/theme-engine -w packages/tokens -w packages/cli

      - name: Test (shard ${{ matrix.shard }}/4)
        env:
          SHARD: ${{ matrix.shard }}
        run: |
          npm run pretest
          npx vitest run --shard=$SHARD/4

      # Per-theme visual regression runs in its own job — see
      # `visual-regression` below. Keeping it out of the shard matrix avoids
      # paying the Playwright browser install cost on every shard.

  visual-regression:
    name: Visual regression (per-theme)
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build workspace packages
        run: npm run build -w packages/theme-engine -w packages/tokens

      - name: Install Playwright browsers (chromium only)
        run: npx playwright install --with-deps chromium

      # Generate the theme overlay + private-theme manifest BEFORE Playwright
      # parses the test files. The VR spec imports `lib/private-themes` at
      # module-load time, so the generated TS must exist on disk first. The
      # docs predev hook will re-run inside Playwright's webServer, but by
      # then it's too late for the import.
      - name: Generate theme manifests
        env:
          # When set, install @low-orbit-studio/visor-themes-private and
          # snapshot private themes too. On community PRs the secret is empty
          # and only stock themes are exercised — still a meaningful gate.
          # The env var name stays `GITHUB_PACKAGES_TOKEN` because `.npmrc`
          # and `generate-private-themes.mjs` read it under that name; the
          # GitHub-side secret has to use a non-`GITHUB_`-prefixed name per
          # Actions' reserved-prefix rule, hence LO_PACKAGES_READ_TOKEN.
          GITHUB_PACKAGES_TOKEN: ${{ secrets.LO_PACKAGES_READ_TOKEN }}
        run: |
          node packages/docs/scripts/ensure-theme-overlays.mjs
          node packages/docs/scripts/generate-private-themes.mjs

      - name: Run per-theme VR suite
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.LO_PACKAGES_READ_TOKEN }}
        run: npm run test:vr -w packages/docs

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/docs/playwright-report/
          retention-days: 14

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: packages/docs/test-results/
          retention-days: 14

  # Aggregator job: keeps the "Build & Test" check name stable for branch
  # protection rules that predate the matrix split (VI-171).
  build-and-test-summary:
    name: Build & Test
    needs: [changes, build-and-test]
    if: always() && needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Verify all shards passed
        env:
          RESULT: ${{ needs.build-and-test.result }}
        run: |
          if [ "$RESULT" != "success" ]; then
            echo "One or more test shards failed: $RESULT"
            exit 1
          fi
          echo "All test shards passed."

  verify-docs:
    name: Verify docs build
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build -w packages/theme-engine && npm run build -w packages/tokens

      - name: Build docs site
        run: npm run docs:build

  flutter-test:
    name: Flutter analyze + test (CI goldens)
    needs: changes
    if: needs.changes.outputs.flutter == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.5"
          channel: stable
          cache: true

      - name: Resolve dependencies
        working-directory: components/flutter
        run: flutter pub get

      - name: Analyze
        working-directory: components/flutter
        run: flutter analyze

      - name: Setup Node.js (for visor CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Build CLI
        run: npm run build -w packages/theme-engine -w packages/tokens -w packages/cli

      - name: Resolve solespark-ui example dependencies
        working-directory: examples/flutter/solespark-ui
        run: flutter pub get

      - name: Verify Flutter theme output (visor theme verify)
        run: node packages/cli/dist/index.js theme verify --target flutter examples/flutter/solespark-ui

      - name: Test (each widget directory)
        working-directory: components/flutter
        run: |
          # `flutter test` requires a `test/` directory at the package root, but
          # this package keeps tests next to source (`<widget>/<widget>_test.dart`).
          # Pass each widget directory explicitly so the package test runner
          # discovers every `*_test.dart` file. Goldens are CI-only (Ahem font),
          # configured in flutter_test_config.dart.
          dirs=$(find . -maxdepth 1 -mindepth 1 -type d -name 'visor_*' | sort)
          if [ -z "$dirs" ]; then
            echo "::error::No visor_* widget directories found under components/flutter/"
            exit 1
          fi
          flutter test $dirs
