name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  check:
    name: Lint, typecheck, build, and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Validate
        run: npm run validate

      - name: Test
        run: npm run test

      # Visual regression tests disabled — pages not yet stable enough for baselines.
      # Re-enable when docs site pages are finalized. See roadmap.
      # - name: Install Playwright browsers
      #   run: npx playwright install --with-deps
      # - name: Visual regression tests
      #   run: npm run test:vr -w packages/docs
