name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a PAT (not GITHUB_TOKEN) so commits pushed to changeset-release/main
          # trigger pull_request events. GITHUB_TOKEN-authored pushes are blocked
          # from triggering downstream workflows by GitHub's loop-prevention rule —
          # which silently breaks required CI checks on the Version Packages PR.
          token: ${{ secrets.CHANGESETS_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Test
        run: npm run test

      - name: Compute Version Packages PR title
        id: release_title
        run: |
          TITLE=$(node scripts/compute-release-title.mjs)
          {
            echo "title<<EOF"
            echo "$TITLE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Computed title: $TITLE"

      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          publish: npm run changeset:publish
          title: ${{ steps.release_title.outputs.title }}
          commit: ${{ steps.release_title.outputs.title }}
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_PAT }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
