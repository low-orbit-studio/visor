name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a PAT (not GITHUB_TOKEN) so commits pushed to changeset-release/main
          # trigger pull_request events. GITHUB_TOKEN-authored pushes are blocked
          # from triggering downstream workflows by GitHub's loop-prevention rule —
          # which silently breaks required CI checks on the Version Packages PR.
          token: ${{ secrets.CHANGESETS_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Test
        run: npm run test

      - name: Compute Version Packages PR title
        id: release_title
        run: |
          TITLE=$(node scripts/compute-release-title.mjs)
          {
            echo "title<<EOF"
            echo "$TITLE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Computed title: $TITLE"

      - name: Detect pending changesets
        # Discriminator between the publish path and the PR-refresh path.
        # Pending `.changeset/*.md` files on main mean Changesets has work to
        # consume into a Version Packages PR — that path doesn't publish, so
        # the drift gate below is skipped. Zero pending changesets means the
        # Version Packages PR just merged and we're about to publish — gate runs.
        # No untrusted input is read here; `find` only inspects repo filesystem state.
        # See: VI-361
        id: changesets
        run: |
          PENDING=$(find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' 2>/dev/null | wc -l | tr -d ' ')
          echo "pending=$PENDING" >> "$GITHUB_OUTPUT"
          echo "Pending changesets: $PENDING"

      - name: Check export-surface drift
        # Gate: fail before publish if a workspace downstream imports a symbol
        # that the resolved upstream tarball does not export.
        # Runs only on the publish path (no pending changesets) — the
        # PR-refresh path doesn't push to npm and shouldn't be gated.
        # See: docs/wisdom/W020-publish-coordination-drift.md (VI-337, VI-361)
        if: steps.changesets.outputs.pending == '0'
        run: node scripts/check-export-drift.mjs

      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          publish: npm run changeset:publish
          title: ${{ steps.release_title.outputs.title }}
          commit: ${{ steps.release_title.outputs.title }}
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_PAT }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
