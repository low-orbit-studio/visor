name: Docs

on:
  push:
    branches:
      - main
    paths:
      - "packages/docs/**"
      - "components/**"

# Vercel handles the actual deployment of the docs site and registry JSON
# via its GitHub integration (auto-deploys on push to main).
# This workflow runs a build verification step to catch build errors early.

jobs:
  build-verify:
    name: Verify docs build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build docs site
        run: npm run docs:build
