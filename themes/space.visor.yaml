name: space
version: 1
group: Visor

colors:
  primary: "#5b6fff"
  neutral: "#6b6b80"
  background: "#e0ddef"
  surface: "#f2f0f8"
  success: "#22C55E"
  warning: "#F59E0B"
  error: "#EF4444"
  info: "#0EA5E9"

colors-dark:
  background: "#080810"
  surface: "#0e0e18"

typography:
  heading:
    family: "Satoshi"
    weight: 700
  body:
    family: "Satoshi"
    weight: 400
  mono:
    family: "Monaspace Neon"

spacing:
  base: 4

radius:
  sm: 4
  md: 6
  lg: 8
  xl: 12
  pill: 9999

shadows:
  xs: "0 1px 2px rgba(91, 111, 255, 0.08)"
  sm: "0 1px 3px rgba(91, 111, 255, 0.1)"
  md: "0 4px 12px rgba(91, 111, 255, 0.12)"
  lg: "0 10px 24px rgba(91, 111, 255, 0.14)"
  xl: "0 20px 40px rgba(91, 111, 255, 0.16)"

motion:
  duration-fast: "100ms"
  duration-normal: "200ms"
  duration-slow: "400ms"
  easing: "cubic-bezier(0.4, 0, 0.2, 1)"

overrides:
  light:
    text-primary: "#1a1630"
    text-secondary: "rgba(26, 22, 48, 0.72)"
    text-tertiary: "rgba(26, 22, 48, 0.65)"
    text-link: "#5b6fff"
    interactive-primary-bg: "#5b6fff"
    interactive-primary-text: "#ffffff"
    border-focus: "#5b6fff"
  dark:
    text-primary: "#e8e8f0"
    text-secondary: "rgba(232, 232, 240, 0.72)"
    text-tertiary: "rgba(232, 232, 240, 0.5)"
    text-link: "#8b9fff"
    interactive-primary-bg: "#5b6fff"
    interactive-primary-text: "#ffffff"
    border-focus: "#5b6fff"
