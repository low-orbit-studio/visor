name: modern-minimal
version: 1
group: Visor

colors:
  primary: "oklch(0.71 0.21 161)"
  neutral: "#6B7280"
  background: "#FFFFFF"
  surface: "#FFFFFF"
  success: "#22C55E"
  warning: "#F59E0B"
  error: "#EF4444"
  info: "#0EA5E9"

colors-dark:
  primary: "oklch(0.75 0.21 162)"
  background: "#000000"
  surface: "#0a0a0a"

typography:
  heading:
    family: "Product Sans"
    weight: 700
    source: "visor-fonts"
    org: "low-orbit-studio"
  body:
    family: "Product Sans"
    weight: 400
    source: "visor-fonts"
    org: "low-orbit-studio"

spacing:
  base: 4

radius:
  sm: 8
  md: 12
  lg: 16
  xl: 20
  pill: 9999

shadows:
  xs: "0 1px 2px rgba(0, 0, 0, 0.04)"
  sm: "0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04)"
  md: "0 4px 6px rgba(0, 0, 0, 0.05), 0 2px 4px rgba(0, 0, 0, 0.04)"
  lg: "0 10px 15px rgba(0, 0, 0, 0.06), 0 4px 6px rgba(0, 0, 0, 0.04)"
  xl: "0 20px 25px rgba(0, 0, 0, 0.06), 0 8px 10px rgba(0, 0, 0, 0.03)"

motion:
  duration-fast: "100ms"
  duration-normal: "200ms"
  duration-slow: "400ms"
  easing: "cubic-bezier(0.4, 0, 0.2, 1)"

overrides:
  light:
    text-primary: "rgba(0, 0, 0, 0.9)"
    text-secondary: "rgba(0, 0, 0, 0.55)"
    text-tertiary: "rgba(0, 0, 0, 0.55)"
  dark:
    text-primary: "rgba(255, 255, 255, 0.7)"
    text-secondary: "rgba(255, 255, 255, 0.70)"
    text-tertiary: "rgba(255, 255, 255, 0.55)"
    text-disabled: "rgba(255, 255, 255, 0.1)"
    surface-page: "#000000"
    surface-card: "rgba(255, 255, 255, 0.04)"
    surface-subtle: "rgba(255, 255, 255, 0.02)"
    surface-muted: "rgba(255, 255, 255, 0.04)"
    border-default: "rgba(255, 255, 255, 0.06)"
    border-muted: "rgba(255, 255, 255, 0.03)"
    border-strong: "rgba(255, 255, 255, 0.1)"
