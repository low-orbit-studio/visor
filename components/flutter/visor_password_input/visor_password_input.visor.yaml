name: password-input
description: Password input with show/hide visibility toggle, floating label, and validation states. Composed on top of visor_text_input.
category: form

when_to_use:
  - Any password, PIN, or secret-value field in an auth or settings flow
  - Fields where the user benefits from being able to reveal the value they are typing
  - Confirm-password fields requiring cross-field validation

when_not_to_use:
  - Plain text fields without a secrecy requirement (use visor_text_input)
  - OTP / one-time code entry (use visor_otp_input)

files:
  - components/flutter/visor_password_input/visor_password_input.dart
  - components/flutter/visor_text_input/visor_text_input.dart
  - components/flutter/visor_password_input/visor_password_input_test.dart

pubDependencies:
  - { pub: visor_core, version: "^0.1.0" }
