name: Avatar
description: A circular avatar component with image display and fallback support for initials or icons.
category: data-display

when_to_use:
  - User profile pictures in headers, comments, or lists
  - Participant indicators in collaborative interfaces
  - Contact or team member thumbnails
  - Any place a person or entity needs a visual representation

when_not_to_use:
  - Decorative illustrations or product images (use a plain img element)
  - Logo display (use NavbarBrand or a dedicated logo component)
  - Icon buttons (use Button with an icon)
  - Large hero images or banners (use a custom image layout)

why: >
  Avatar wraps Radix UI Avatar for reliable image loading with automatic fallback
  when the image fails or is missing. Three size variants keep avatar dimensions
  consistent. The fallback displays centered text (typically initials) on a muted
  background, ensuring the layout never breaks due to missing images.

props:
  - name: size
    type: '"sm" | "default" | "lg"'
    default: '"default"'
    description: "Controls avatar dimensions (1.5rem, 2rem, 2.5rem)"

sub_components:
  - name: AvatarImage
    description: The image element that fills the avatar circle with object-fit cover.
  - name: AvatarFallback
    description: Centered fallback content (initials or icon) shown when image is unavailable.

dependencies:
  - "@radix-ui/react-avatar"

example: |
  <Avatar size="default">
    <AvatarImage src="/avatar.jpg" alt="Jane Doe" />
    <AvatarFallback>JD</AvatarFallback>
  </Avatar>
