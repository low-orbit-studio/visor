name: StationSpectrum
description: Animated N-station progress diagram with a hairline rail that draws on scroll-entry and dots that illuminate sequentially via CSS transition delays. Designed for "process / phases / pipeline" marketing diagrams.
extends: HTMLElement
category: visual-elements

when_to_use:
  - Illustrating a multi-step process, pipeline, or phased journey on marketing or landing pages
  - Showing the stages of an engagement model (e.g. discovery → brand → engineering → infrastructure)
  - Animating a sequential workflow diagram that reveals on scroll
  - Decorating a section header with a visual representation of sequential phases

when_not_to_use:
  - When the user needs to navigate between steps — use `stepper` instead
  - When stations need icons or custom rendering per dot — extend the component for that use case
  - In compact admin layouts where the horizontal rail cannot breathe (use a text list or timeline instead)
  - For vertical orientation — this component is horizontal-only in v1

why: >
  Process diagrams are a recurring pattern across marketing sites and deck templates.
  The closest primitive (`stepper`) is an interactive navigation control — a fundamentally
  different shape. A static, CSS-animated, scroll-triggered diagram is its own primitive.
  Filed during the catalog audit of the Low Orbit Studio prototype (strata-v1/index.html
  lines 1791–1851). Keeping it atomic preserves the stepper's interactive navigation role
  while giving marketing pages a dedicated, non-interactive visual element.

props:
  - name: stations
    type: Station[]
    required: true
    description: >
      Array of station objects. Each station has `num` (string label, e.g. "01"),
      `title` (string), and optional `description` (string). Minimum 2 stations recommended.
  - name: density
    type: "'compact' | 'default'"
    required: false
    default: "'default'"
    description: >
      Visual density of the diagram. `compact` reduces dot size and hides descriptions
      for tighter horizontal spaces.
  - name: inView
    type: boolean
    required: false
    description: >
      When `autoTrigger` is false, this prop drives the animation.
      Set to `true` to activate the rail draw and dot illumination.
  - name: autoTrigger
    type: boolean
    required: false
    default: "true"
    description: >
      When true (default), the component auto-wires an IntersectionObserver to trigger
      the animation when the component enters the viewport. Set to false to control
      the trigger manually via the `inView` prop and your own ref/hook.

dependencies:
  - "@loworbitstudio/visor-core"

preview_url: "https://visor.design/docs/components/visual-elements/station-spectrum"

example: |
  <StationSpectrum
    stations={[
      { num: '01', title: 'Discovery', description: 'Goals, audience, constraints, what success looks like.' },
      { num: '02', title: 'Brand',     description: 'Name, identity, voice, and a design system that scales.' },
      { num: '03', title: 'Product design', description: 'Wireframes, screens, interactions, prototypes you can hold.' },
      { num: '04', title: 'Engineering',    description: 'Apps, websites, APIs. Built, shipped, and live in production.' },
      { num: '05', title: 'Infrastructure', description: 'Logs, metrics, deploys, on-call. The boring parts.' },
    ]}
  />
