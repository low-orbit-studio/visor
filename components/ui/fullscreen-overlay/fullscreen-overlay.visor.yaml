name: FullscreenOverlay
description: >-
  A full-viewport overlay for expanding content to fill the screen. Built on Radix
  Dialog with close button, Escape to dismiss, focus trap, and body scroll lock.
extends: HTMLDivElement
category: overlay
when_to_use:
  - Expanding block previews or demos to full viewport
  - Showing content in an immersive full-screen view
  - Any scenario needing a dismissible full-viewport portal
why: >-
  Block previews and interactive demos need a way to expand to full viewport for
  immersive viewing. Dialog is too constrained — this provides a clean full-screen
  portal with accessibility built in.
when_not_to_use:
  - Standard modal dialogs — use Dialog instead
  - Image galleries — use Lightbox instead
  - Side panels — use Sheet instead
props:
  - name: open
    type: boolean
    default: "undefined"
    description: Controlled open state
  - name: onOpenChange
    type: "(open: boolean) => void"
    default: "undefined"
    description: Called when open state changes
  - name: children
    type: React.ReactNode
    default: "undefined"
    description: Trigger and content sub-components
  - name: fullbleed
    type: boolean
    default: false
    description: Remove all padding so content fills the entire viewport (FullscreenOverlayContent only)

sub_components:
  - name: FullscreenOverlay
    description: Root component wrapping Radix Dialog.Root
  - name: FullscreenOverlayTrigger
    description: Button that opens the overlay
  - name: FullscreenOverlayContent
    description: Full-viewport portal container for children
dependencies:
  - "@radix-ui/react-dialog"
  - "@phosphor-icons/react"
  - "@loworbitstudio/visor-core"
registryDependencies:
  - utils
example: |
  <FullscreenOverlay>
    <FullscreenOverlayTrigger>Expand</FullscreenOverlayTrigger>
    <FullscreenOverlayContent>
      <p>Full-screen content here</p>
    </FullscreenOverlayContent>
  </FullscreenOverlay>
