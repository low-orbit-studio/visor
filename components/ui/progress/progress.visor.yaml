name: Progress
description: Horizontal bar indicating completion percentage of a task.
extends: HTMLDivElement
category: feedback

when_to_use:
  - File upload progress
  - Multi-step form or wizard completion
  - Loading or processing indicators with known progress
  - Profile completeness or quota usage
  - Static admin-chrome capacity meters (KPI strips, time-until indicators) — use `size="thin"` and `animate={false}`

when_not_to_use:
  - Indeterminate loading with no known progress (use Skeleton or a spinner)
  - Step-by-step navigation (use Breadcrumb or Tabs)
  - Binary on/off state (use Switch)
  - Circular progress indicators (build a custom component)

why: >
  Progress wraps Radix UI Progress with Visor token styling, providing a
  fully accessible progress bar with correct aria-valuenow, aria-valuemin,
  and aria-valuemax attributes. The indicator uses CSS transform for smooth
  animated transitions when the value changes. A `size="thin"` variant
  renders a flat 4px capacity bar for static admin chrome, and `animate={false}`
  drops the indicator transition for server-rendered or initial-mount-only
  use cases.

props:
  - name: value
    type: number
    description: Current progress value from 0 to 100
  - name: size
    type: '"default" | "thin"'
    default: '"default"'
    description: Track size. `"thin"` renders a 4px-tall capacity bar for static admin chrome.
  - name: animate
    type: boolean
    default: 'true'
    description: Whether the indicator transitions on value change. Set to `false` for static chrome.

dependencies:
  - "@radix-ui/react-progress"

preview_url: "https://visor.loworbit.studio/docs/components/data-display/progress"

example: |
  <Progress value={65} />

  {/* Static 4px chrome (e.g. door-open capacity meter — caller normalizes 0-1 to 0-100) */}
  <Progress
    value={Math.round(ratio * 100)}
    size="thin"
    animate={false}
    aria-label="Time until door opens"
  />
