name: Input
description: A text input component with focus and validation states.
extends: HTMLInputElement
category: form

when_to_use:
  - Single-line text entry (name, email, search, URL)
  - Password fields
  - Numeric input with type="number"
  - File uploads with type="file"

when_not_to_use:
  - Multi-line text entry (use Textarea)
  - Selecting from predefined options (use Select or Combobox)
  - Boolean on/off values (use Checkbox or Switch)
  - Rich text editing (use a dedicated rich text editor)

why: >
  Input provides consistent styling, focus rings, validation states, and
  disabled appearance across all text-based form fields. It supports
  aria-invalid for error states and integrates with the Field component
  for labels and error messages.

props:
  - name: size
    type: "'sm' | 'md' | 'lg'"
    default: "md"
    description: Controls height, padding, font-size, and border-radius
  - name: type
    type: string
    default: "text"
    description: HTML input type (text, email, password, number, file, etc.)
  - name: leadingIcon
    type: React.ReactNode
    description: Optional leading glyph rendered inside the field (e.g. a Phosphor icon). The input reserves enough left padding to clear it.
  - name: passwordManagers
    type: "'ignore' | 'allow'"
    default: "ignore"
    description: >
      Controls password-manager autofill behavior. Defaults to "ignore" so contact, marketing, and settings forms don't render 1Password/Bitwarden/LastPass autofill icons. Set to "allow" on login and credential fields. When "ignore", emits data-1p-ignore, data-bwignore, data-lpignore, and data-form-type="other" — the four per-manager opt-out attributes browsers honor where autocomplete="off" is ignored.

dependencies: []

preview_url: "https://visor.loworbit.studio/docs/components/form/input"

example: |
  <Input type="email" placeholder="you@example.com" />

  <Input type="password" passwordManagers="allow" aria-invalid="true" />
