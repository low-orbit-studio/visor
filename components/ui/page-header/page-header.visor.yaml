name: PageHeader
description: Admin page header compound with eyebrow, title, description, breadcrumb, and actions slots.
extends: HTMLElement
category: navigation

when_to_use:
  - Rendering the top header of an admin or app page
  - Pairing a page title with a cluster of actions (buttons, overflow menus)
  - Showing a breadcrumb above a page title
  - Providing supporting description copy under a page title

when_not_to_use:
  - Section-level headings inside a page body (use Heading directly)
  - Marketing hero sections with media and large CTAs
  - Modal or sheet titles (those components have their own title slots)

why: >
  The page-header pattern was repeated inline ~10 times across blacklight-admin
  and feature-local in veronica-admin. Canonicalizing it into a single
  compound enforces consistent vertical rhythm, responsive collapse behavior,
  and heading semantics across admin surfaces.

variants:
  size: [sm, md, lg]

props:
  - name: title
    type: React.ReactNode
    required: true
    description: Page heading content. Rendered in the element given by titleAs.
  - name: eyebrow
    type: React.ReactNode
    description: Small uppercase label rendered above the title.
  - name: description
    type: React.ReactNode
    description: Supporting copy rendered below the title.
  - name: breadcrumb
    type: React.ReactNode
    description: ReactNode rendered above the title row, typically a Breadcrumb.
  - name: actions
    type: React.ReactNode
    description: ReactNode rendered on the right side of the title row.
  - name: as
    type: "'header' | 'section' | 'div'"
    default: "header"
    description: Root element tag.
  - name: titleAs
    type: "'h1' | 'h2' | 'h3'"
    default: "h1"
    description: Heading element used for the title.
  - name: size
    type: "'sm' | 'md' | 'lg'"
    default: "md"
    description: Controls vertical rhythm and title size.
  - name: titleSize
    type: "'default' | 'marquee' | string"
    description: >
      Title font-size override, orthogonal to `size`. `"default"` and
      `"marquee"` are tokens that map to `data-title-size` attributes
      (marquee renders at the `--page-header-title-size` custom property,
      defaulting to 3.5rem). Any other string is forwarded as a raw CSS
      length on an inline `--page-header-title-size` declaration and
      rendered with the marquee rule.
  - name: titleFamily
    type: "'heading' | 'display' | string"
    description: >
      Title font-family override. `"heading"` and `"display"` are tokens
      that map to `data-title-family` attributes; `"display"` resolves to
      `var(--font-display, var(--font-family-heading, inherit))` so themes
      without a display font degrade to the heading family. Any other
      string is forwarded as a raw CSS family on an inline
      `--page-header-title-family` declaration.

css_custom_properties:
  - name: "--page-header-title-size"
    description: >
      Override hook for the title font-size used by `titleSize="marquee"`.
      Defaults to `3.5rem`. Themes can override per-page via a wrapping
      className; the `titleSize` prop is sugar over this property.
  - name: "--page-header-title-family"
    description: >
      Override hook for the title font-family used by
      `titleFamily="display"`. Defaults to
      `var(--font-display, var(--font-family-heading, inherit))`. Themes
      can override per-page via a wrapping className; the `titleFamily`
      prop is sugar over this property.

responsive:
  breakpoints:
    - at: "480px"
      behavior: "Below a 480px container width the main row switches from horizontal (title left, actions right) to vertical stacking: flex-direction becomes column with align-items: flex-start, and the actions cluster expands to full width with justify-content: flex-start. Triggered by a CSS container query on the .base element (container-name: page-header)."
  notes: "Uses CSS container queries (container-type: inline-size), so the breakpoint is relative to the PageHeader's own width, not the viewport. This means the layout collapses based on available space regardless of screen size."

dependencies:
  - "class-variance-authority"

preview_url: "https://visor.loworbit.studio/docs/components/admin/page-header"

example: |
  <PageHeader
    eyebrow="Blacklight Admin"
    title="Customers"
    description="Manage customer accounts, billing, and access."
    actions={
      <>
        <Button variant="outline">Export</Button>
        <Button>New customer</Button>
      </>
    }
  />

  // Marquee title, display font (editorial admin hero)
  <PageHeader
    eyebrow="Sat · Apr 27 · 22:00 — 04:00 · Two events"
    title="Tonight"
    titleSize="marquee"
    titleFamily="display"
  />
