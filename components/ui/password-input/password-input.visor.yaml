name: PasswordInput
description: A password input with show/hide toggle and optional strength meter.
extends: HTMLInputElement
category: form

when_to_use:
  - Password entry fields (login, signup, change password)
  - Any sensitive text that should be masked by default

when_not_to_use:
  - Non-sensitive text input (use Input)
  - OTP/verification codes (use OTPInput)

why: >
  PasswordInput provides a consistent password entry experience with a
  visibility toggle and optional strength feedback. The toggle improves
  usability by letting users verify their input, while the strength
  meter encourages stronger passwords.

props:
  - name: showStrength
    type: boolean
    default: "false"
    description: Show a password strength meter below the input.

dependencies:
  - "@phosphor-icons/react"

preview_url: "https://visor.loworbit.studio/docs/components/form/password-input"

example: |
  <PasswordInput placeholder="Enter password" showStrength />
