name: Textarea
description: A textarea component with focus and validation states.
extends: HTMLTextAreaElement
category: form

when_to_use:
  - Multi-line text entry (comments, descriptions, notes)
  - Long-form content input (bios, messages, feedback)
  - Any input where users need to see multiple lines at once

when_not_to_use:
  - Single-line text entry (use Input)
  - Rich text editing with formatting (use a dedicated rich text editor)
  - Code editing (use a code editor component)

why: >
  Textarea provides consistent styling, focus rings, and validation states
  that match the Input component. It disables browser resize by default for
  layout consistency and supports aria-invalid for error states. It
  integrates with the Field component for labels and error messages.

props:
  - name: size
    type: "'sm' | 'md' | 'lg'"
    default: "md"
    description: Controls min-height, padding, font-size, and border-radius
  - name: rows
    type: number
    description: Number of visible text lines
  - name: placeholder
    type: string
  - name: passwordManagers
    type: "'ignore' | 'allow'"
    default: "ignore"
    description: >
      Controls password-manager autofill behavior. Defaults to "ignore" so contact, marketing, and settings forms don't render 1Password/Bitwarden/LastPass autofill icons. Set to "allow" on the rare credential field where autofill is desired. When "ignore", emits data-1p-ignore, data-bwignore, data-lpignore, and data-form-type="other" — the four per-manager opt-out attributes browsers honor where autocomplete="off" is ignored.

dependencies: []

preview_url: "https://visor.loworbit.studio/docs/components/form/textarea"

example: |
  <Textarea placeholder="Write your message..." rows={4} />

  <Textarea aria-invalid="true" />
